<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>实时像素化摄像头</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000; color: #fff;
            font-family: 'Courier New', monospace;
            height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        #viewfinder {
            position: relative;
            width: 100vw; height: 100vw;
            max-width: 500px; max-height: 500px;
            background: #111; overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 10px;
        }
        video { display: none; }
        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated; /* 保持像素硬边 */
        }
        .controls {
            width: 100%; max-width: 500px;
            padding: 0 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .slider-group {
            display: flex; align-items: center; gap: 12px;
            background: #1a1a1a; padding: 10px 16px;
            border-radius: 30px; border: 1px solid #333;
        }
        .slider-group label {
            font-size: 16px; color: #aaa; width: 60px;
        }
        input[type=range] {
            flex: 1; accent-color: #d4af37;
        }
        .slider-value {
            width: 40px; text-align: center; font-weight: bold;
            color: #d4af37; font-size: 18px;
        }
        .btn-row {
            display: flex; gap: 10px; justify-content: center;
        }
        button {
            background: #2a2a2a; border: 1px solid #444;
            color: #ddd; padding: 10px 20px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        button:active { background: #3a3a3a; }
        button.primary { background: #d4af37; color: #000; border-color: #d4af37; }
        .warning {
            color: #ff7777; font-size: 12px; text-align: center;
            margin-top: 4px;
        }
        .info {
            color: #888; font-size: 12px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
    </div>
    <div class="controls">
        <div class="slider-group">
            <label>像素尺寸</label>
            <input type="range" id="pixelSize" min="2" max="40" value="8" step="1">
            <span class="slider-value" id="pixelValue">8</span>
        </div>
        <div class="btn-row">
            <button id="freezeBtn">🧊 冻结</button>
            <button id="captureBtn" class="primary">📸 拍照</button>
        </div>
        <div class="info">点击画面切换冻结 · 触摸对焦</div>
        <div class="warning" id="warning"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const pixelSlider = document.getElementById('pixelSize');
        const pixelValue = document.getElementById('pixelValue');
        const freezeBtn = document.getElementById('freezeBtn');
        const captureBtn = document.getElementById('captureBtn');
        const warningEl = document.getElementById('warning');

        let stream = null;
        let animationId = null;
        let frozen = false;
        let frozenFrame = null; // 存储冻结时的图像数据
        let currentPixelSize = 8;

        // ========== 摄像头初始化 ==========
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                // 等视频元数据加载后设置 canvas 尺寸
                video.addEventListener('loadedmetadata', () => {
                    // 保持正方形裁剪（取中心部分）
                    const size = Math.min(video.videoWidth, video.videoHeight);
                    canvas.width = size;
                    canvas.height = size;
                    startPixelLoop();
                });
                warningEl.textContent = '';
            } catch (err) {
                warningEl.textContent = '无法访问摄像头，请授权或使用HTTPS';
                console.error(err);
            }
        }

        // ========== 像素化核心算法 ==========
        function pixelateFrame() {
            if (!stream || video.readyState < 2) return;
            
            // 将视频绘制到临时 canvas 截取正方形中心区域
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const size = Math.min(vw, vh);
            tempCanvas.width = size;
            tempCanvas.height = size;
            
            // 计算裁剪起始点（中心裁剪）
            const sx = (vw - size) / 2;
            const sy = (vh - size) / 2;
            tempCtx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
            
            // 获取图像数据
            const imageData = tempCtx.getImageData(0, 0, size, size);
            const data = imageData.data;
            
            // 像素化：缩小到 blockSize 分辨率再放大
            const blockSize = currentPixelSize;
            const smallW = Math.floor(size / blockSize);
            const smallH = Math.floor(size / blockSize);
            
            // 创建小型离屏 canvas 绘制缩小图像
            const smallCanvas = document.createElement('canvas');
            smallCanvas.width = smallW;
            smallCanvas.height = smallH;
            const smallCtx = smallCanvas.getContext('2d');
            // 关闭平滑，保持硬边
            smallCtx.imageSmoothingEnabled = false;
            
            // 方法：遍历每个大块，计算平均颜色，然后填充到小 canvas
            const smallImageData = smallCtx.createImageData(smallW, smallH);
            for (let y = 0; y < smallH; y++) {
                for (let x = 0; x < smallW; x++) {
                    let r = 0, g = 0, b = 0, count = 0;
                    // 计算源图中对应 block 的平均颜色
                    const startX = x * blockSize;
                    const startY = y * blockSize;
                    const endX = Math.min(startX + blockSize, size);
                    const endY = Math.min(startY + blockSize, size);
                    
                    for (let sy2 = startY; sy2 < endY; sy2++) {
                        for (let sx2 = startX; sx2 < endX; sx2++) {
                            const idx = (sy2 * size + sx2) * 4;
                            r += data[idx];
                            g += data[idx + 1];
                            b += data[idx + 2];
                            count++;
                        }
                    }
                    r = Math.round(r / count);
                    g = Math.round(g / count);
                    b = Math.round(b / count);
                    
                    const smallIdx = (y * smallW + x) * 4;
                    smallImageData.data[smallIdx] = r;
                    smallImageData.data[smallIdx + 1] = g;
                    smallImageData.data[smallIdx + 2] = b;
                    smallImageData.data[smallIdx + 3] = 255;
                }
            }
            smallCtx.putImageData(smallImageData, 0, 0);
            
            // 将小图像放大回原尺寸
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, canvas.width, canvas.height);
        }

        // ========== 动画循环 ==========
        function startPixelLoop() {
            function loop() {
                if (!frozen) {
                    pixelateFrame();
                } else if (frozenFrame) {
                    // 冻结时直接绘制存储的帧
                    ctx.putImageData(frozenFrame, 0, 0);
                }
                animationId = requestAnimationFrame(loop);
            }
            loop();
        }

        // ========== 冻结/解冻 ==========
        function toggleFreeze() {
            if (frozen) {
                frozen = false;
                frozenFrame = null;
                freezeBtn.textContent = '🧊 冻结';
                freezeBtn.classList.remove('active');
            } else {
                frozen = true;
                // 保存当前帧
                frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                freezeBtn.textContent = '🔥 解冻';
                freezeBtn.classList.add('active');
            }
        }

        freezeBtn.addEventListener('click', toggleFreeze);
        canvas.addEventListener('click', toggleFreeze);

        // ========== 拍照保存 ==========
        captureBtn.addEventListener('click', () => {
            if (!stream) return;
            // 如果处于冻结状态，直接保存冻结帧；否则临时冻结一帧保存
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'pixel_photo.png';
            link.href = dataUrl;
            link.click();
        });

        // ========== 像素大小调节 ==========
        pixelSlider.addEventListener('input', () => {
            currentPixelSize = parseInt(pixelSlider.value);
            pixelValue.textContent = currentPixelSize;
        });

        // ========== 清理 ==========
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });

        // 启动
        initCamera();
    </script>
</body>
</html>
