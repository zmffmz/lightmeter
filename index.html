<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>胶片测光表</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22胶片测光表%22%2C%22short_name%22%3A%22测光表%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000%22%2C%22theme_color%22%3A%22%23d4af37%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%23d4af37'%2F%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            color: #d4af37;
            font-family: 'Courier New', monospace;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        #viewfinder {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/3;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(0.3) contrast(1.1);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            padding: 10px;
        }
        .ev-display {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 2px 12px;
            align-self: center;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 8px black;
            background: rgba(0,0,0,0.6);
            border-radius: 6px;
            padding: 4px 10px;
        }
        .meter-zone {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 2px dashed rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255,255,200,0.3);
        }
        .controls {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        .iso-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #444;
        }
        .iso-btn {
            background: #2a2a2a;
            border: none;
            color: #d4af37;
            font-size: 22px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .iso-value {
            font-size: 22px;
            font-weight: bold;
            width: 70px;
            text-align: center;
        }
        .exposure-preview {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #444;
            font-size: 18px;
            display: flex;
            gap: 20px;
        }
        .lock-btn {
            background: #2a2a2a;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lock-btn.active {
            background: #d4af37;
            color: #000;
        }
        .warning {
            color: #ff7777;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
            <div class="ev-display" id="evValue">--</div>
            <div class="info-bar">
                <span id="shutterDisplay">1/125</span>
                <span id="apertureDisplay">f/5.6</span>
            </div>
        </div>
        <div class="meter-zone"></div>
    </div>
    <div class="controls">
        <div class="iso-selector">
            <button class="iso-btn" id="isoDown">−</button>
            <div class="iso-value" id="isoDisplay">400</div>
            <button class="iso-btn" id="isoUp">+</button>
        </div>
        <div class="exposure-preview">
            <span id="shutterMain">1/125</span>
            <span id="apertureMain">f/5.6</span>
        </div>
        <button class="lock-btn" id="lockBtn">🔒 AE-L</button>
    </div>
    <div class="warning" id="warning"></div>

    <script>
        const isoValues = [25, 50, 64, 80, 100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400];
        const shutterStops = [1/4000, 1/2000, 1/1000, 1/500, 1/250, 1/125, 1/60, 1/30, 1/15, 1/8, 1/4, 1/2, 1, 2, 4, 8, 15, 30];
        const apertureStops = [1.0, 1.4, 2.0, 2.8, 4.0, 5.6, 8, 11, 16, 22, 32, 45];

        let currentISO = 400;
        let currentEV = null;
        let locked = false;
        let lockedEV = null;
        let stream = null;
        let animationId = null;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // DOM元素
        const video = document.getElementById('video');
        const evValueEl = document.getElementById('evValue');
        const shutterDisplay = document.getElementById('shutterDisplay');
        const apertureDisplay = document.getElementById('apertureDisplay');
        const shutterMain = document.getElementById('shutterMain');
        const apertureMain = document.getElementById('apertureMain');
        const isoDisplay = document.getElementById('isoDisplay');
        const lockBtn = document.getElementById('lockBtn');
        const warningEl = document.getElementById('warning');

        // 初始化摄像头
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', aspectRatio: 4/3, width: { ideal: 320 }, height: { ideal: 240 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                warningEl.textContent = '';
                startMetering();
            } catch (err) {
                warningEl.textContent = '无法访问摄像头，请授权或使用HTTPS';
                console.error(err);
                // 模拟数据演示
                simulateMetering();
            }
        }

        // 模拟测光（当摄像头不可用时用随机值演示）
        function simulateMetering() {
            setInterval(() => {
                if (!locked) {
                    currentEV = Math.round((10 + Math.random() * 6) * 10) / 10; // EV 10~16
                    updateDisplay();
                }
            }, 500);
        }

        // 计算中心区域平均亮度
        function measureEV() {
            if (!stream || video.readyState < 2) return;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 取中心区域 (25% 宽高)
            const centerX = Math.floor(canvas.width * 0.375);
            const centerY = Math.floor(canvas.height * 0.375);
            const sampleW = Math.floor(canvas.width * 0.25);
            const sampleH = Math.floor(canvas.height * 0.25);
            
            const imageData = ctx.getImageData(centerX, centerY, sampleW, sampleH);
            const data = imageData.data;
            let totalLuminance = 0;
            let pixelCount = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                // 相对亮度 (sRGB 灰阶公式)
                const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                totalLuminance += luminance;
                pixelCount++;
            }
            
            const avgLuminance = totalLuminance / pixelCount; // 0-255
            // 转换为 EV (基于 K=12.5 的测光表校准)
            // EV = log2(L * S / K) , 其中 L 是 cd/m², S 是 ISO, 这里需要把像素亮度映射到场景亮度
            // 简化为：假设 18% 灰在 sRGB=118 对应 EV0 @ISO100 映射为 EV = log2( (avg/255) * 100 * 参考值 )
            // 实际使用经验公式，使室内约EV8-9，户外约EV14-15
            const normalized = avgLuminance / 255;
            if (normalized <= 0) return;
            // 校准系数，通过实验调整
            const EV = Math.log2(normalized * 1000) + 3.2; 
            currentEV = Math.round(EV * 10) / 10;
        }

        // 根据EV和ISO计算曝光组合 (光圈优先，使用常用档位)
        function calcExposure(ev) {
            if (ev === null || ev === undefined) return { shutter: '--', aperture: '--' };
            
            // 曝光方程： EV = log2(N²/t) - log2(ISO/100)
            // 移项： N²/t = 2^(EV + log2(ISO/100))
            const isoFactor = Math.log2(currentISO / 100);
            const targetN2OverT = Math.pow(2, ev + isoFactor);
            
            // 光圈优先：选最近的标准光圈值
            let bestShutter = '--';
            let bestAperture = '--';
            let minDiff = Infinity;
            
            for (let f of apertureStops) {
                const t = (f * f) / targetN2OverT;
                // 找到最接近的标准快门速度
                let closestShutter = shutterStops.reduce((prev, curr) => {
                    return Math.abs(curr - t) < Math.abs(prev - t) ? curr : prev;
                });
                
                const diff = Math.abs(closestShutter - t) / t;
                if (diff < minDiff) {
                    minDiff = diff;
                    bestAperture = f;
                    bestShutter = closestShutter;
                }
            }
            
            // 格式化快门显示
            const formatShutter = (s) => {
                if (s >= 1) return s + '"';
                return '1/' + Math.round(1/s);
            };
            
            return {
                shutter: formatShutter(bestShutter),
                aperture: 'f/' + bestAperture.toFixed(1)
            };
        }

        function updateDisplay() {
            const ev = locked ? lockedEV : currentEV;
            if (ev !== null) {
                evValueEl.textContent = ev.toFixed(1) + ' EV';
            } else {
                evValueEl.textContent = '--';
            }
            
            const exposure = calcExposure(ev);
            shutterDisplay.textContent = exposure.shutter;
            apertureDisplay.textContent = exposure.aperture;
            shutterMain.textContent = exposure.shutter;
            apertureMain.textContent = exposure.aperture;
            isoDisplay.textContent = currentISO;
        }

        function startMetering() {
            function loop() {
                if (!locked) {
                    measureEV();
                }
                updateDisplay();
                animationId = requestAnimationFrame(loop);
            }
            loop();
        }

        // ISO调整
        document.getElementById('isoUp').addEventListener('click', () => {
            const idx = isoValues.indexOf(currentISO);
            if (idx < isoValues.length - 1) {
                currentISO = isoValues[idx + 1];
                if (locked) locked = false; // 改变ISO自动解锁
                updateDisplay();
            }
        });
        document.getElementById('isoDown').addEventListener('click', () => {
            const idx = isoValues.indexOf(currentISO);
            if (idx > 0) {
                currentISO = isoValues[idx - 1];
                if (locked) locked = false;
                updateDisplay();
            }
        });

        // 锁定/解锁
        lockBtn.addEventListener('click', () => {
            if (locked) {
                locked = false;
                lockedEV = null;
                lockBtn.textContent = '🔒 AE-L';
                lockBtn.classList.remove('active');
            } else {
                locked = true;
                lockedEV = currentEV;
                lockBtn.textContent = '🔓 AE-L (锁定)';
                lockBtn.classList.add('active');
            }
            updateDisplay();
        });

        // 点击画面也可以锁定/解锁
        document.getElementById('viewfinder').addEventListener('click', () => {
            lockBtn.click();
        });

        // 启动
        initCamera();

        // 清理
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
