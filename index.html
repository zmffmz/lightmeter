<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>像素化滤镜相机 · 红黑/蓝黑/黑白</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000; color: #fff;
            font-family: 'Courier New', monospace;
            height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        #viewfinder {
            position: relative;
            width: 100vw; height: 100vw;
            max-width: 500px; max-height: 500px;
            background: #111; overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 8px;
        }
        video { display: none; }
        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        .controls {
            width: 100%; max-width: 500px;
            padding: 0 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .filter-row {
            display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a1a; border: 1px solid #444;
            color: #888; padding: 8px 14px; border-radius: 20px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #d4af37; color: #000; border-color: #d4af37;
        }
        .slider-group {
            display: flex; align-items: center; gap: 12px;
            background: #1a1a1a; padding: 10px 16px;
            border-radius: 30px; border: 1px solid #333;
        }
        .slider-group label {
            font-size: 16px; color: #aaa; width: 60px;
        }
        input[type=range] {
            flex: 1; accent-color: #d4af37;
        }
        .slider-value {
            width: 40px; text-align: center; font-weight: bold;
            color: #d4af37; font-size: 18px;
        }
        .btn-row {
            display: flex; gap: 10px; justify-content: center;
        }
        button {
            background: #2a2a2a; border: 1px solid #444;
            color: #ddd; padding: 10px 20px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        button:active { background: #3a3a3a; }
        button.primary { background: #d4af37; color: #000; border-color: #d4af37; }
        .warning {
            color: #ff7777; font-size: 13px; text-align: center;
            margin-top: 2px; padding: 0 20px;
        }
        .info {
            color: #888; font-size: 12px; text-align: center;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
    </div>
    <div class="controls">
        <div class="filter-row">
            <button class="filter-btn active" data-filter="none">🎨 原色</button>
            <button class="filter-btn" data-filter="red">🔴 红黑</button>
            <button class="filter-btn" data-filter="blue">🔵 蓝黑</button>
            <button class="filter-btn" data-filter="bw">⚫ 黑白</button>
        </div>
        <div class="slider-group">
            <label>像素尺寸</label>
            <input type="range" id="pixelSize" min="2" max="40" value="8" step="1">
            <span class="slider-value" id="pixelValue">8</span>
        </div>
        <div class="btn-row">
            <button id="freezeBtn">🧊 冻结</button>
            <button id="captureBtn" class="primary">📸 拍照</button>
        </div>
        <div class="info">点击画面切换冻结 · 触摸对焦</div>
        <div class="warning" id="warning"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const pixelSlider = document.getElementById('pixelSize');
        const pixelValue = document.getElementById('pixelValue');
        const freezeBtn = document.getElementById('freezeBtn');
        const captureBtn = document.getElementById('captureBtn');
        const warningEl = document.getElementById('warning');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let stream = null;
        let animationId = null;
        let frozen = false;
        let frozenFrame = null;
        let currentPixelSize = 8;
        let currentFilter = 'none';
        let videoReady = false;
        let initAttempted = false;

        // 滤镜切换
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
            });
        });

        // 摄像头启动
        async function initCamera() {
            if (initAttempted) return;
            initAttempted = true;
            warningEl.textContent = '正在请求摄像头...';
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 640 },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                video.addEventListener('loadedmetadata', () => {
                    videoReady = true;
                    setupCanvasAndStart();
                    warningEl.textContent = '';
                });
                
                setTimeout(() => {
                    if (!videoReady && video.videoWidth > 0) {
                        videoReady = true;
                        setupCanvasAndStart();
                        warningEl.textContent = '';
                    } else if (!videoReady) {
                        warningEl.textContent = '摄像头已打开但未获取画面，尝试刷新页面';
                    }
                }, 2000);
                
            } catch (err) {
                warningEl.textContent = '摄像头权限被拒绝，请在浏览器设置中允许相机权限后刷新页面';
                console.error('Camera error:', err);
            }
        }

        function setupCanvasAndStart() {
            const size = Math.min(video.videoWidth, video.videoHeight) || 640;
            canvas.width = size;
            canvas.height = size;
            startPixelLoop();
        }

        // ★ 新：稳定 RGB 处理，不引入 HSL
        function applyFilterToBlock(r, g, b) {
            const satBoost = 1.8;    // 目标通道强度增强
            const lumReduce = 0.7;   // 整体亮度系数
            const threshold = 25;    // 暗部压黑阈值

            switch (currentFilter) {
                case 'red': {
                    // 保留红色为主，混入极少绿、蓝以保留一点点轮廓（否则暗部全黑就无细节）
                    let rr = r * satBoost;
                    let gg = g * 0.15;
                    let bb = b * 0.15;
                    rr *= lumReduce;
                    gg *= lumReduce;
                    bb *= lumReduce;
                    rr = Math.min(255, rr);
                    gg = Math.min(255, gg);
                    bb = Math.min(255, bb);
                    if (r < threshold) return [0, 0, 0];
                    return [rr, gg, bb];
                }
                case 'blue': {
                    let rr = r * 0.15;
                    let gg = g * 0.15;
                    let bb = b * satBoost;
                    rr *= lumReduce;
                    gg *= lumReduce;
                    bb *= lumReduce;
                    rr = Math.min(255, rr);
                    gg = Math.min(255, gg);
                    bb = Math.min(255, bb);
                    if (b < threshold) return [0, 0, 0];
                    return [rr, gg, bb];
                }
                case 'bw': {
                    const gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    const contrast = gray < 128 ? 0 : 255;
                    return [contrast, contrast, contrast];
                }
                case 'none':
                default:
                    return [r, g, b];
            }
        }

        // 像素化核心
        function pixelateFrame() {
            if (!stream || !videoReady || video.readyState < 2) return;
            
            const vw = video.videoWidth || 640;
            const vh = video.videoHeight || 640;
            const size = Math.min(vw, vh);
            if (size === 0) return;
            
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = size;
            tempCanvas.height = size;
            
            const sx = (vw - size) / 2;
            const sy = (vh - size) / 2;
            tempCtx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
            
            const imageData = tempCtx.getImageData(0, 0, size, size);
            const data = imageData.data;
            
            const blockSize = currentPixelSize;
            const smallW = Math.floor(size / blockSize);
            const smallH = Math.floor(size / blockSize);
            
            const smallCanvas = document.createElement('canvas');
            smallCanvas.width = smallW;
            smallCanvas.height = smallH;
            const smallCtx = smallCanvas.getContext('2d');
            smallCtx.imageSmoothingEnabled = false;
            
            const smallImageData = smallCtx.createImageData(smallW, smallH);
            
            for (let y = 0; y < smallH; y++) {
                for (let x = 0; x < smallW; x++) {
                    let sumR = 0, sumG = 0, sumB = 0, count = 0;
                    const startX = x * blockSize;
                    const startY = y * blockSize;
                    const endX = Math.min(startX + blockSize, size);
                    const endY = Math.min(startY + blockSize, size);
                    
                    for (let sy2 = startY; sy2 < endY; sy2++) {
                        for (let sx2 = startX; sx2 < endX; sx2++) {
                            const idx = (sy2 * size + sx2) * 4;
                            sumR += data[idx];
                            sumG += data[idx + 1];
                            sumB += data[idx + 2];
                            count++;
                        }
                    }
                    let avgR = Math.round(sumR / count);
                    let avgG = Math.round(sumG / count);
                    let avgB = Math.round(sumB / count);
                    
                    const [fr, fg, fb] = applyFilterToBlock(avgR, avgG, avgB);
                    
                    const smallIdx = (y * smallW + x) * 4;
                    smallImageData.data[smallIdx] = fr;
                    smallImageData.data[smallIdx + 1] = fg;
                    smallImageData.data[smallIdx + 2] = fb;
                    smallImageData.data[smallIdx + 3] = 255;
                }
            }
            smallCtx.putImageData(smallImageData, 0, 0);
            
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, canvas.width, canvas.height);
        }

        function startPixelLoop() {
            function loop() {
                if (!frozen) {
                    pixelateFrame();
                } else if (frozenFrame) {
                    ctx.putImageData(frozenFrame, 0, 0);
                }
                animationId = requestAnimationFrame(loop);
            }
            loop();
        }

        function toggleFreeze() {
            if (frozen) {
                frozen = false;
                frozenFrame = null;
                freezeBtn.textContent = '🧊 冻结';
            } else {
                frozen = true;
                if (canvas.width > 0 && canvas.height > 0) {
                    frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                }
                freezeBtn.textContent = '🔥 解冻';
            }
        }

        freezeBtn.addEventListener('click', toggleFreeze);
        canvas.addEventListener('click', toggleFreeze);

        captureBtn.addEventListener('click', () => {
            if (canvas.width === 0) return;
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'pixel_photo.png';
            link.href = dataUrl;
            link.click();
        });

        pixelSlider.addEventListener('input', () => {
            currentPixelSize = parseInt(pixelSlider.value);
            pixelValue.textContent = currentPixelSize;
        });

        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });

        initCamera();
    </script>
</body>
</html>
