<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>像素相机</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000; color: #fff;
            font-family: 'Courier New', monospace;
            height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        #viewfinder {
            position: relative;
            width: 100vw; height: 100vw;
            max-width: 500px; max-height: 500px;
            background: #111; overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        video { display: none; }
        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        .placeholder {
            color: #555; font-size: 16px; text-align: center;
            pointer-events: none;
        }
        .controls {
            width: 100%; max-width: 500px;
            padding: 0 20px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .filter-row {
            display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a1a; border: 1px solid #444;
            color: #888; padding: 8px 14px; border-radius: 20px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #d4af37; color: #000; border-color: #d4af37;
        }
        .slider-group {
            display: flex; align-items: center; gap: 10px;
            background: #1a1a1a; padding: 8px 14px;
            border-radius: 30px; border: 1px solid #333;
        }
        .slider-group label {
            font-size: 14px; color: #aaa; width: 55px;
        }
        input[type=range] {
            flex: 1; accent-color: #d4af37;
        }
        .slider-value {
            width: 36px; text-align: center; font-weight: bold;
            color: #d4af37; font-size: 16px;
        }
        .btn-row {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
        }
        button {
            background: #2a2a2a; border: 1px solid #444;
            color: #ddd; padding: 10px 14px; border-radius: 25px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        button:active { background: #3a3a3a; }
        button.primary { background: #d4af37; color: #000; border-color: #d4af37; }
        .warning {
            color: #ff7777; font-size: 13px; text-align: center;
            margin-top: 2px; padding: 0 20px;
        }
        .info {
            color: #888; font-size: 12px; text-align: center;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
        <div class="placeholder" id="placeholder">上传照片 或 使用摄像头</div>
    </div>
    <div class="controls">
        <!-- 滤镜模式按钮 -->
        <div class="filter-row">
            <button class="filter-btn active" data-filter="none">原色</button>
            <button class="filter-btn" data-filter="red">红黑</button>
            <button class="filter-btn" data-filter="blue">蓝黑</button>
            <button class="filter-btn" data-filter="bw">黑白</button>
        </div>
        <!-- 像素尺寸 -->
        <div class="slider-group">
            <label>像素</label>
            <input type="range" id="pixelSize" min="2" max="40" value="8" step="1">
            <span class="slider-value" id="pixelValue">8</span>
        </div>
        <!-- 剪影阈值 -->
        <div class="slider-group" id="thresholdRow">
            <label>阈值</label>
            <input type="range" id="thresholdSlider" min="20" max="200" value="80" step="1">
            <span class="slider-value" id="thresholdValue">80</span>
        </div>
        <!-- 颜色深度 -->
        <div class="slider-group" id="colorDepthRow">
            <label>亮度</label>
            <input type="range" id="colorDepthSlider" min="50" max="255" value="220" step="1">
            <span class="slider-value" id="colorDepthValue">220</span>
        </div>
        <!-- 按钮行 -->
        <div class="btn-row">
            <button id="uploadBtn">上传</button>
            <button id="cameraBtn">拍照</button>
            <button id="switchCameraBtn">切换</button>
            <button id="freezeBtn">冻结</button>
            <button id="downloadBtn" class="primary">保存</button>
        </div>
        <div class="info">点击画面切换冻结</div>
        <div class="warning" id="warning"></div>
    </div>
    <!-- 隐藏的文件选择器 -->
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <script>
        // ========== DOM 元素 ==========
        const video = document.getElementById('video');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const placeholder = document.getElementById('placeholder');
        const pixelSlider = document.getElementById('pixelSize');
        const pixelValue = document.getElementById('pixelValue');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValue = document.getElementById('thresholdValue');
        const colorDepthSlider = document.getElementById('colorDepthSlider');
        const colorDepthValue = document.getElementById('colorDepthValue');
        const thresholdRow = document.getElementById('thresholdRow');
        const colorDepthRow = document.getElementById('colorDepthRow');
        const freezeBtn = document.getElementById('freezeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const fileInput = document.getElementById('fileInput');
        const warningEl = document.getElementById('warning');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // ========== 状态变量 ==========
        let stream = null;
        let animationId = null;
        let frozen = false;
        let frozenFrame = null;
        let currentPixelSize = 8;
        let currentFilter = 'none';
        let currentFacingMode = 'environment';
        let videoReady = false;
        let initAttempted = false;
        let thresholdValue_user = 80;
        let colorDepth = 220;
        let uploadedImage = null;      // 存储上传的照片
        let mode = 'camera';           // 'camera' 或 'upload'

        // ========== 滑块事件 ==========
        thresholdSlider.addEventListener('input', () => {
            thresholdValue_user = parseInt(thresholdSlider.value);
            thresholdValue.textContent = thresholdValue_user;
        });
        colorDepthSlider.addEventListener('input', () => {
            colorDepth = parseInt(colorDepthSlider.value);
            colorDepthValue.textContent = colorDepth;
        });

        // ========== 滤镜切换 ==========
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                if (currentFilter === 'red' || currentFilter === 'blue') {
                    thresholdRow.style.display = 'flex';
                    colorDepthRow.style.display = 'flex';
                } else {
                    thresholdRow.style.display = 'none';
                    colorDepthRow.style.display = 'none';
                }
                // 如果有上传的图片，重新处理
                if (mode === 'upload' && uploadedImage) {
                    processImage();
                }
            });
        });
        thresholdRow.style.display = 'none';
        colorDepthRow.style.display = 'none';

        // ========== 摄像头清理 ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            videoReady = false;
        }

        // ========== 切换到摄像头模式 ==========
        async function switchToCamera() {
            stopCamera();
            mode = 'camera';
            uploadedImage = null;
            frozen = false;
            frozenFrame = null;
            freezeBtn.textContent = '冻结';
            canvas.style.display = 'none';
            placeholder.style.display = 'block';
            await initCamera();
        }

        // ========== 切换到上传模式 ==========
        function switchToUpload(img) {
            stopCamera();
            mode = 'upload';
            uploadedImage = img;
            frozen = false;
            frozenFrame = null;
            freezeBtn.textContent = '冻结';
            videoReady = false;
            placeholder.style.display = 'none';
            canvas.style.display = 'block';
            processImage();
        }

        // ========== 启动摄像头 ==========
        async function initCamera() {
            stopCamera();
            initAttempted = false;
            frozen = false;
            frozenFrame = null;
            freezeBtn.textContent = '冻结';
            
            if (initAttempted) return;
            initAttempted = true;
            warningEl.textContent = '正在请求摄像头...';
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 640, height: 640 },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                video.addEventListener('loadedmetadata', () => {
                    videoReady = true;
                    setupCanvasAndStart();
                    warningEl.textContent = '';
                    switchCameraBtn.textContent = '切换';
                    placeholder.style.display = 'none';
                    canvas.style.display = 'block';
                });
                
                setTimeout(() => {
                    if (!videoReady && video.videoWidth > 0) {
                        videoReady = true;
                        setupCanvasAndStart();
                        warningEl.textContent = '';
                        placeholder.style.display = 'none';
                        canvas.style.display = 'block';
                    } else if (!videoReady) {
                        warningEl.textContent = '摄像头未能获取画面';
                    }
                }, 2000);
                
            } catch (err) {
                warningEl.textContent = '摄像头权限被拒绝';
                placeholder.textContent = '请使用上传照片功能';
                console.error('Camera error:', err);
            }
        }

        // ========== 切换摄像头 ==========
        switchCameraBtn.addEventListener('click', () => {
            if (mode === 'upload') return;
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            initCamera();
        });

        // ========== 上传照片按钮 ==========
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => switchToUpload(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ========== 相机按钮 ==========
        cameraBtn.addEventListener('click', switchToCamera);

        function setupCanvasAndStart() {
            const size = Math.min(video.videoWidth, video.videoHeight) || 640;
            canvas.width = size;
            canvas.height = size;
            startPixelLoop();
        }

        // ========== 处理上传的图片 ==========
        function processImage() {
            if (!uploadedImage) return;
            
            // 保持正方形裁剪
            const imgW = uploadedImage.width;
            const imgH = uploadedImage.height;
            const size = Math.min(imgW, imgH);
            
            canvas.width = size;
            canvas.height = size;
            
            // 画到临时canvas
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = size;
            tempCanvas.height = size;
            
            const sx = (imgW - size) / 2;
            const sy = (imgH - size) / 2;
            tempCtx.drawImage(uploadedImage, sx, sy, size, size, 0, 0, size, size);
            
            const imageData = tempCtx.getImageData(0, 0, size, size);
            pixelateData(imageData, size);
        }

        // ========== 滤镜函数 ==========
        function applyFilterToBlock(r, g, b) {
            switch (currentFilter) {
                case 'red': {
                    if (r >= thresholdValue_user) return [colorDepth, 15, 15];
                    return [0, 0, 0];
                }
                case 'blue': {
                    if (b >= thresholdValue_user) return [15, 15, colorDepth];
                    return [0, 0, 0];
                }
                case 'bw': {
                    const gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    const contrast = gray < 128 ? 0 : 255;
                    return [contrast, contrast, contrast];
                }
                default:
                    return [r, g, b];
            }
        }

        // ========== 通用像素化处理（摄像头和上传共用） ==========
    function pixelateData(imageData, size) {
    const data = imageData.data;
    const blockSize = currentPixelSize;
    const smallW = Math.floor(size / blockSize);
    const smallH = Math.floor(size / blockSize);
    
    // ===== 第一步：原来的像素化（小图放大，速度极快） =====
    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = smallW;
    smallCanvas.height = smallH;
    const smallCtx = smallCanvas.getContext('2d');
    smallCtx.imageSmoothingEnabled = false;
    
    const smallImageData = smallCtx.createImageData(smallW, smallH);
    
    for (let y = 0; y < smallH; y++) {
        for (let x = 0; x < smallW; x++) {
            let sumR = 0, sumG = 0, sumB = 0, count = 0;
            const startX = x * blockSize;
            const startY = y * blockSize;
            const endX = Math.min(startX + blockSize, size);
            const endY = Math.min(startY + blockSize, size);
            
            for (let sy = startY; sy < endY; sy++) {
                for (let sx = startX; sx < endX; sx++) {
                    const idx = (sy * size + sx) * 4;
                    sumR += data[idx];
                    sumG += data[idx + 1];
                    sumB += data[idx + 2];
                    count++;
                }
            }
            let avgR = Math.round(sumR / count);
            let avgG = Math.round(sumG / count);
            let avgB = Math.round(sumB / count);
            
            const [fr, fg, fb] = applyFilterToBlock(avgR, avgG, avgB);
            
            const smallIdx = (y * smallW + x) * 4;
            smallImageData.data[smallIdx] = fr;
            smallImageData.data[smallIdx + 1] = fg;
            smallImageData.data[smallIdx + 2] = fb;
            smallImageData.data[smallIdx + 3] = 255;
        }
    }
    smallCtx.putImageData(smallImageData, 0, 0);
    
    // 放大到最终画布
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, canvas.width, canvas.height);
    
    // ===== 第二步：叠加圆形遮罩 =====
    // 创建一个临时的遮罩画布，画上黑色背景 + 透明圆孔
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = canvas.width;
    maskCanvas.height = canvas.height;
    const maskCtx = maskCanvas.getContext('2d');
    
    // 先铺满黑色（会把方块之间的缝隙染黑，但圆孔会透出像素色）
    maskCtx.fillStyle = '#000';
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    
    // 在每个像素块中心画透明圆孔
    const radius = (blockSize / 2) * 0.85; // 可调：0.85 是圆点大小
    
    for (let y = 0; y < canvas.height; y += blockSize) {
        for (let x = 0; x < canvas.width; x += blockSize) {
            const centerX = x + blockSize / 2;
            const centerY = y + blockSize / 2;
            
            // 用 destination-out 模式挖孔（把黑色变成透明）
            maskCtx.globalCompositeOperation = 'destination-out';
            maskCtx.beginPath();
            maskCtx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            maskCtx.fill();
        }
    }
    
    // 将遮罩盖到主画布上
    ctx.drawImage(maskCanvas, 0, 0);
}

        // ========== 摄像头像素化 ==========
        function pixelateFrame() {
    if (!stream || !videoReady || video.readyState < 2) return;
    
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 640;
    const size = Math.min(vw, vh);
    if (size === 0) return;
    
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = size;
    tempCanvas.height = size;
    
    const sx = (vw - size) / 2;
    const sy = (vh - size) / 2;
    tempCtx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
    
    const imageData = tempCtx.getImageData(0, 0, size, size);
    pixelateData(imageData, size); // 调用上面修改后的通用函数
}

        // ========== 动画循环（仅摄像头模式） ==========
        function startPixelLoop() {
            function loop() {
                if (mode !== 'camera') {
                    cancelAnimationFrame(animationId);
                    return;
                }
                if (!frozen) {
                    pixelateFrame();
                } else if (frozenFrame) {
                    ctx.putImageData(frozenFrame, 0, 0);
                }
                animationId = requestAnimationFrame(loop);
            }
            loop();
        }

        // ========== 冻结/解冻 ==========
        function toggleFreeze() {
            if (frozen) {
                frozen = false;
                frozenFrame = null;
                freezeBtn.textContent = '冻结';
            } else {
                frozen = true;
                if (canvas.width > 0 && canvas.height > 0) {
                    frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                }
                freezeBtn.textContent = '解冻';
            }
        }

        freezeBtn.addEventListener('click', toggleFreeze);
        canvas.addEventListener('click', toggleFreeze);

        // ========== 保存下载 ==========
        downloadBtn.addEventListener('click', () => {
            if (canvas.width === 0) return;
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'pixel_photo.png';
            link.href = dataUrl;
            link.click();
        });

        // ========== 像素尺寸滑块 ==========
        pixelSlider.addEventListener('input', () => {
            currentPixelSize = parseInt(pixelSlider.value);
            pixelValue.textContent = currentPixelSize;
            if (mode === 'upload' && uploadedImage) {
                processImage();
            }
        });

        // ========== 清理 ==========
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });

        // 初始启动摄像头
        initCamera();
    </script>
</body>
</html>
